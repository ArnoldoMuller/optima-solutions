<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOT · Plano de Trabalho Gantt 2026</title>
<style>
:root {
  --bg:   #ffffff;
  --bg2:  #f5f5f3;
  --bg3:  #eeecea;
  --text:  #1a1a18;
  --text2: #6b6b67;
  --text3: #9a9a96;
  --border:  rgba(0,0,0,0.11);
  --border2: rgba(0,0,0,0.22);
  --info-bg:     #e6f1fb;
  --info-text:   #185FA5;
  --info-border: #378ADD;
  --success:    #0F6E56;
  --success-bg: #e6f5f1;
  --warn:    #BA7517;
  --warn-bg: #fdf3e3;
  --radius-sm: 5px;
  --radius-md: 8px;
  --radius-lg: 12px;
}
 
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg3);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}
 
.container {
  max-width: 1060px;
  margin: 0 auto;
  padding: 28px 20px 64px;
}
 
/* HEADER */
.header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
 
.logo {
  width: 46px;
  height: 46px;
  background: var(--info-text);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  flex-shrink: 0;
}
 
.header-info { flex: 1; min-width: 200px; }
 
.header-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
}
 
.header-subtitle {
  font-size: 12px;
  color: var(--text2);
  margin-top: 3px;
}
 
.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
 
.badge-warn {
  background: var(--warn-bg);
  color: var(--warn);
  border: 1px solid rgba(186,117,23,0.28);
  border-radius: var(--radius-sm);
  padding: 4px 11px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
}
 
.task-counter { text-align: right; }
 
.counter-row {
  display: flex;
  align-items: baseline;
  gap: 4px;
  justify-content: flex-end;
}
 
.counter-done {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
 
.counter-sep {
  font-size: 14px;
  color: var(--text3);
}
 
.counter-total {
  font-size: 14px;
  color: var(--text2);
  font-weight: 500;
}
 
.counter-label {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}
 
/* PROGRESS */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 22px;
}
 
.progress-track {
  flex: 1;
  height: 5px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 99px;
  overflow: hidden;
}
 
.progress-fill {
  height: 100%;
  background: var(--success);
  border-radius: 99px;
  width: 0%;
  transition: width 0.35s ease;
}
 
.progress-pct {
  font-size: 12px;
  color: var(--text2);
  min-width: 38px;
  text-align: right;
}
 
/* TABS */
.tabs-wrap {
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
 
.tabs-left { display: flex; }
 
.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 8px 16px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text2);
  cursor: pointer;
  margin-bottom: -1px;
  transition: color 0.15s;
}
 
.tab-btn:hover { color: var(--text); }
 
.tab-btn.active {
  color: var(--info-text);
  font-weight: 500;
  border-bottom-color: var(--info-text);
}
 
.reset-btn {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: color 0.15s, background 0.15s;
  margin-bottom: 4px;
}
.reset-btn:hover { color: #D85A30; background: rgba(216,90,48,0.08); }
 
/* LEGEND */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 16px;
}
 
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text2);
}
 
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}
 
/* GANTT WRAPPER */
.gantt-wrap {
  background: var(--bg2);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  overflow: hidden;
}
 
.gantt-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
 
.gantt-table {
  border-collapse: collapse;
  table-layout: fixed;
  min-width: 860px;
  width: 100%;
}
 
/* GANTT THEAD */
.th-task {
  position: sticky;
  left: 0;
  z-index: 4;
  background: var(--bg2);
  padding: 8px 12px;
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  text-align: left;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border2);
  width: 224px;
  min-width: 224px;
}
 
.th-week {
  padding: 6px 3px 5px;
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  vertical-align: bottom;
  width: 68px;
}
 
.th-week .wk-label { display: block; line-height: 1.2; }
.th-week .wk-date  { display: block; font-size: 9px; color: var(--text3); font-weight: 400; margin-top: 1px; }
 
.th-week.is-current {
  background: rgba(55,138,221,0.07);
  color: var(--info-text);
}
.th-week.is-current .wk-date { color: rgba(24,95,165,0.6); }
 
.th-week.is-event {
  background: rgba(216,90,48,0.08);
  color: #D85A30;
}
.th-week.is-event .wk-date { color: rgba(216,90,48,0.65); }
 
/* PHASE HEADER ROW */
.phase-row td {
  background: var(--bg2);
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.2px;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 7px 0;
}
 
.phase-row .ph-label {
  position: sticky;
  left: 0;
  z-index: 2;
  background: var(--bg2);
  padding: 7px 12px;
  border-right: 1px solid var(--border2) !important;
}
 
/* TASK ROWS */
.task-row td {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  height: 36px;
  vertical-align: middle;
  transition: background 0.1s;
}
 
.task-row:hover td { background: var(--bg2); }
 
.td-task {
  position: sticky;
  left: 0;
  z-index: 2;
  padding: 0 10px 0 12px;
  border-right: 1px solid var(--border2) !important;
}
 
.task-row:hover .td-task { background: var(--bg2); }
 
.task-name-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
 
.task-name-wrap input[type="checkbox"] {
  accent-color: var(--info-text);
  width: 13px;
  height: 13px;
  flex-shrink: 0;
  cursor: pointer;
}
 
.task-name {
  font-size: 12px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}
 
.task-row.done .task-name {
  text-decoration: line-through;
  color: var(--text3);
}
 
.badge-urgent {
  font-size: 9px;
  background: rgba(216,90,48,0.15);
  color: #D85A30;
  border-radius: 99px;
  padding: 1px 7px;
  white-space: nowrap;
  flex-shrink: 0;
  font-weight: 500;
}
 
.td-gantt {
  padding: 0;
  vertical-align: middle;
}
 
.td-gantt.is-current { background: rgba(55,138,221,0.04); }
.td-gantt.is-event   { background: rgba(216,90,48,0.04);  }
 
.task-row:hover .td-gantt.is-current { background: rgba(55,138,221,0.09); }
.task-row:hover .td-gantt.is-event   { background: rgba(216,90,48,0.09);  }
 
.bar-div {
  height: 18px;
  width: 100%;
  display: block;
}
 
/* CHECKLIST */
.checklist-wrap {
  display: none;
  flex-direction: column;
  gap: 16px;
}
 
.checklist-wrap.visible { display: flex; }
 
.cl-phase {
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
}
 
.cl-phase-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--bg2);
}
 
.cl-phase-head .ph-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
 
.cl-phase-head span {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}
 
.cl-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  user-select: none;
}
 
.cl-item:hover { background: var(--bg3); }
 
.cl-item input[type="checkbox"] {
  accent-color: var(--info-text);
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  cursor: pointer;
}
 
.cl-item-name {
  flex: 1;
  font-size: 13px;
  color: var(--text);
}
 
.cl-item.done .cl-item-name {
  text-decoration: line-through;
  color: var(--text3);
}
 
.cl-dates {
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
}
 
/* FOOTER */
.footer {
  text-align: center;
  margin-top: 40px;
  font-size: 11px;
  color: var(--text3);
}
 
/* RESPONSIVE */
@media (max-width: 680px) {
  .th-task  { width: 160px; min-width: 160px; }
  .td-task  { min-width: 160px; }
  .gantt-table { min-width: 700px; }
  .header-title { font-size: 15px; }
  .counter-done { font-size: 22px; }
}
 
/* PRINT */
@media print {
  body { background: #fff; }
  .tabs-wrap { display: none !important; }
  .gantt-view { display: block !important; }
  .checklist-wrap { display: flex !important; margin-top: 40px; }
  .gantt-scroll { overflow: visible; }
  .gantt-table { min-width: unset; }
}
</style>
</head>
<body>
<div class="container">
 
  <!-- HEADER -->
  <div class="header">
    <div class="logo">AOT</div>
    <div class="header-info">
      <div class="header-title">AOT · Advanced Osteotomy Training</div>
      <div class="header-subtitle">Dr. Marcelo Torres · Dr. Helder Rocha · Dr. Ricardo Manilov</div>
    </div>
    <div class="header-right">
      <div class="badge-warn">⚠ 9 semanas · Evento 26–27 Jul 2026</div>
      <div class="task-counter">
        <div class="counter-row">
          <span class="counter-done" id="done-count">0</span>
          <span class="counter-sep">/</span>
          <span class="counter-total" id="total-count">0</span>
        </div>
        <div class="counter-label">tarefas concluídas</div>
      </div>
    </div>
  </div>
 
  <!-- PROGRESS BAR -->
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-pct" id="progress-pct">0%</div>
  </div>
 
  <!-- TABS -->
  <div class="tabs-wrap">
    <div class="tabs-left">
      <button class="tab-btn active" id="tab-gantt" onclick="switchTab('gantt')">Gantt</button>
      <button class="tab-btn" id="tab-checklist" onclick="switchTab('checklist')">Checklist</button>
    </div>
    <button class="reset-btn" onclick="resetAll()" title="Desmarcar todas as tarefas">↺ Resetar progresso</button>
  </div>
 
  <!-- LEGEND -->
  <div class="legend" id="legend"></div>
 
  <!-- GANTT -->
  <div id="gantt-view" class="gantt-view">
    <div class="gantt-wrap">
      <div class="gantt-scroll">
        <table class="gantt-table" id="gantt-table"></table>
      </div>
    </div>
  </div>
 
  <!-- CHECKLIST -->
  <div class="checklist-wrap" id="checklist-view"></div>
 
  <!-- FOOTER -->
  <div class="footer">AOT · Advanced Osteotomy Training · Goiânia 2026 · Brasil &amp; Argentina</div>
 
</div>
 
<script>
/* ─── DATA ─── */
const WEEKS = [
  { label:'S1',     date:'19/Mai', start: new Date(2026,4,19), event: false },
  { label:'S2',     date:'26/Mai', start: new Date(2026,4,26), event: false },
  { label:'S3',     date:'02/Jun', start: new Date(2026,5,2),  event: false },
  { label:'S4',     date:'09/Jun', start: new Date(2026,5,9),  event: false },
  { label:'S5',     date:'16/Jun', start: new Date(2026,5,16), event: false },
  { label:'S6',     date:'23/Jun', start: new Date(2026,5,23), event: false },
  { label:'S7',     date:'30/Jun', start: new Date(2026,5,30), event: false },
  { label:'S8',     date:'07/Jul', start: new Date(2026,6,7),  event: false },
  { label:'S9',     date:'14/Jul', start: new Date(2026,6,14), event: false },
  { label:'S10',    date:'21/Jul', start: new Date(2026,6,21), event: false },
  { label:'EVENTO', date:'26-27/Jul', start: new Date(2026,6,26), event: true },
];
 
const PHASES = [
  {
    id:1, name:'Branding & Estratégia Digital', color:'#534AB7', rgb:'83,74,183',
    tasks:[
      { id:1,  name:'Briefing da identidade visual AOT',       urgent:true,  s:1, e:2  },
      { id:2,  name:'Desenvolvimento do logotipo oficial',      urgent:true,  s:1, e:3  },
      { id:3,  name:'Criação do Instagram & Landing Page',      urgent:true,  s:2, e:4  },
      { id:4,  name:'Conteúdo teaser — patologias',             urgent:false, s:3, e:5  },
      { id:5,  name:'Posts TC, RX e planejamento virtual',      urgent:false, s:5, e:8  },
      { id:6,  name:'Abertura de inscrições — link de vendas',  urgent:false, s:5, e:8  },
    ]
  },
  {
    id:2, name:'Captação de Patrocinadores', color:'#1D9E75', rgb:'29,158,117',
    tasks:[
      { id:7,  name:'Mídia kit / proposta comercial PDF',          urgent:true,  s:1, e:3 },
      { id:8,  name:'Definir cotas Diamante, Ouro e Prata',        urgent:true,  s:1, e:2 },
      { id:9,  name:'Prospecção OPME (placas, guias, motores)',    urgent:false, s:2, e:5 },
      { id:10, name:'Prospecção ác. hialurônico/regenerativos',    urgent:false, s:2, e:5 },
      { id:11, name:'Fechar contratos e confirmar entregas',       urgent:false, s:4, e:7 },
    ]
  },
  {
    id:3, name:'Pacientes & Centro Cirúrgico', color:'#D85A30', rgb:'216,90,48',
    tasks:[
      { id:12, name:'Triagem e seleção dos casos cirúrgicos',        urgent:true,  s:1, e:4  },
      { id:13, name:'TCLE — elaboração e coleta de assinaturas',     urgent:false, s:3, e:5  },
      { id:14, name:'Termo de uso de imagem do paciente',            urgent:false, s:3, e:5  },
      { id:15, name:'Centralizar exames (TC, sangue, risco)',        urgent:false, s:5, e:8  },
      { id:16, name:'Equipe de suporte pós-operatório',              urgent:false, s:6, e:9  },
      { id:17, name:'Confirmação final dos pacientes',               urgent:false, s:9, e:10 },
    ]
  },
  {
    id:4, name:'Transmissão & Marketing', color:'#378ADD', rgb:'55,138,221',
    tasks:[
      { id:18, name:'Contratação da produtora cirúrgica',            urgent:true,  s:2,  e:4  },
      { id:19, name:'Teste de áudio bidirecional campo-sala',        urgent:false, s:6,  e:8  },
      { id:20, name:'Reels e cobertura Instagram pré-evento',        urgent:false, s:7,  e:10 },
      { id:21, name:'Setup completo transmissão ao vivo',            urgent:false, s:10, e:11 },
    ]
  },
  {
    id:5, name:'Logística & Hospitalidade', color:'#BA7517', rgb:'186,117,23',
    tasks:[
      { id:22, name:'Lista hotéis próximos ao Hospital Unique',      urgent:true,  s:1, e:2  },
      { id:23, name:'Encomendar scrubs bordados AOT',                urgent:false, s:2, e:5  },
      { id:24, name:'Contratar catering: coffee & breaks',           urgent:false, s:6, e:9  },
      { id:25, name:'Welcome kit e brindes dos patrocinadores',      urgent:false, s:7, e:9  },
      { id:26, name:'Certificados físicos premium',                  urgent:false, s:8, e:10 },
    ]
  },
  {
    id:6, name:'Happy Hour de Encerramento', color:'#D4537E', rgb:'212,83,126',
    tasks:[
      { id:27, name:'Reservar local: rooftop ou espaço drinks',     urgent:false, s:2, e:4  },
      { id:28, name:'Contratar bar / serviço de drinks',            urgent:false, s:4, e:7  },
      { id:29, name:'Copos personalizados AOT e branding',          urgent:false, s:7, e:9  },
      { id:30, name:'Roteiro de entrega de certificados',           urgent:false, s:9, e:10 },
    ]
  }
];
 
/* ─── LOCALSTORAGE KEY ─── */
const LS_KEY = 'aot_gantt_2026';
 
/* ─── STATE ─── */
const checked = {};
let totalTasks = 0;
PHASES.forEach(p => p.tasks.forEach(t => { checked[t.id] = false; totalTasks++; }));
 
/* ─── LOAD SAVED STATE ─── */
function loadState() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.keys(parsed).forEach(id => {
        if (id in checked) checked[id] = !!parsed[id];
      });
    }
  } catch(e) { /* silently ignore */ }
}
 
/* ─── SAVE STATE ─── */
function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(checked));
  } catch(e) { /* silently ignore */ }
}
 
/* ─── CURRENT WEEK ─── */
const today = new Date();
let currentWeekIdx = -1;
for (let i = 0; i < WEEKS.length; i++) {
  const nextStart = i + 1 < WEEKS.length ? WEEKS[i+1].start : new Date(2026,6,29);
  if (today >= WEEKS[i].start && today < nextStart) { currentWeekIdx = i; break; }
}
 
/* ─── HELPERS ─── */
function weekDate(n) { return WEEKS[n - 1].date; }
 
function updateStats() {
  const done = Object.values(checked).filter(Boolean).length;
  document.getElementById('done-count').textContent  = done;
  document.getElementById('total-count').textContent = totalTasks;
  const pct = totalTasks ? Math.round(done / totalTasks * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '%';
}
 
function toggle(id) {
  checked[id] = !checked[id];
  const isDone = checked[id];
 
  document.querySelectorAll(`input[data-tid="${id}"]`).forEach(cb => { cb.checked = isDone; });
 
  const row = document.getElementById('gantt-row-' + id);
  if (row) row.classList.toggle('done', isDone);
 
  const item = document.getElementById('cl-item-' + id);
  if (item) item.classList.toggle('done', isDone);
 
  saveState();
  updateStats();
}
 
function resetAll() {
  if (!confirm('Desmarcar todas as tarefas?')) return;
  PHASES.forEach(p => p.tasks.forEach(t => {
    checked[t.id] = false;
    document.querySelectorAll(`input[data-tid="${t.id}"]`).forEach(cb => { cb.checked = false; });
    const row = document.getElementById('gantt-row-' + t.id);
    if (row) row.classList.remove('done');
    const item = document.getElementById('cl-item-' + t.id);
    if (item) item.classList.remove('done');
  }));
  saveState();
  updateStats();
}
 
/* ─── LEGEND ─── */
function buildLegend() {
  const el = document.getElementById('legend');
  PHASES.forEach(p => {
    el.insertAdjacentHTML('beforeend',
      `<div class="legend-item">
        <div class="legend-dot" style="background:${p.color}"></div>
        ${p.name}
      </div>`
    );
  });
}
 
/* ─── GANTT ─── */
function buildGantt() {
  const table = document.getElementById('gantt-table');
  let h = '';
 
  h += '<colgroup>';
  h += '<col style="width:224px;min-width:224px">';
  WEEKS.forEach(w => h += `<col style="width:${w.event ? 80 : 64}px">`);
  h += '</colgroup>';
 
  h += '<thead><tr>';
  h += '<th class="th-task">Tarefa</th>';
  WEEKS.forEach((w, i) => {
    let cls = 'th-week';
    if (i === currentWeekIdx) cls += ' is-current';
    if (w.event) cls += ' is-event';
    h += `<th class="${cls}">
      <span class="wk-label">${w.label}</span>
      <span class="wk-date">${w.date}</span>
    </th>`;
  });
  h += '</tr></thead>';
 
  h += '<tbody>';
 
  PHASES.forEach(p => {
    h += '<tr class="phase-row">';
    h += `<td class="ph-label" style="border-left:3px solid ${p.color}">${p.name}</td>`;
    WEEKS.forEach((w, i) => {
      let cls = 'td-gantt';
      if (i === currentWeekIdx) cls += ' is-current';
      if (w.event) cls += ' is-event';
      h += `<td class="${cls}"></td>`;
    });
    h += '</tr>';
 
    p.tasks.forEach(t => {
      const doneCls = checked[t.id] ? ' done' : '';
      h += `<tr class="task-row${doneCls}" id="gantt-row-${t.id}">`;
 
      h += `<td class="td-task">
        <div class="task-name-wrap">
          <input type="checkbox" data-tid="${t.id}" ${checked[t.id] ? 'checked' : ''} onchange="toggle(${t.id})">
          <span class="task-name">${t.name}</span>
          ${t.urgent ? '<span class="badge-urgent">urgente</span>' : ''}
        </div>
      </td>`;
 
      WEEKS.forEach((w, i) => {
        const wn = i + 1;
        let cls = 'td-gantt';
        if (i === currentWeekIdx) cls += ' is-current';
        if (w.event) cls += ' is-event';
 
        if (wn >= t.s && wn <= t.e) {
          const isFirst = wn === t.s;
          const isLast  = wn === t.e;
 
          let br, barBorder;
          if (isFirst && isLast) {
            br = '4px';
            barBorder = `border:1px solid ${p.color}`;
          } else if (isFirst) {
            br = '4px 0 0 4px';
            barBorder = `border:1px solid ${p.color};border-right:none`;
          } else if (isLast) {
            br = '0 4px 4px 0';
            barBorder = `border:1px solid ${p.color};border-left:none`;
          } else {
            br = '0';
            barBorder = `border-top:1px solid ${p.color};border-bottom:1px solid ${p.color}`;
          }
 
          const tdExtra = !isLast ? 'border-right-color:transparent;' : '';
          h += `<td class="${cls}" style="${tdExtra}padding:0">
            <div class="bar-div" style="border-radius:${br};background:rgba(${p.rgb},0.20);${barBorder}"></div>
          </td>`;
        } else {
          h += `<td class="${cls}"></td>`;
        }
      });
 
      h += '</tr>';
    });
  });
 
  h += '</tbody>';
  table.innerHTML = h;
}
 
/* ─── CHECKLIST ─── */
function buildChecklist() {
  const el = document.getElementById('checklist-view');
  let h = '';
 
  PHASES.forEach(p => {
    h += `<div class="cl-phase">`;
    h += `<div class="cl-phase-head" style="border-left:3px solid ${p.color}">
      <div class="ph-dot" style="background:${p.color}"></div>
      <span>${p.name}</span>
    </div>`;
 
    p.tasks.forEach(t => {
      const doneCls = checked[t.id] ? ' done' : '';
      h += `<label class="cl-item${doneCls}" id="cl-item-${t.id}">
        <input type="checkbox" data-tid="${t.id}" ${checked[t.id] ? 'checked' : ''} onchange="toggle(${t.id})">
        <span class="cl-item-name">${t.name}</span>
        ${t.urgent ? '<span class="badge-urgent">urgente</span>' : ''}
        <span class="cl-dates">${weekDate(t.s)} → ${weekDate(t.e)}</span>
      </label>`;
    });
 
    h += `</div>`;
  });
 
  el.innerHTML = h;
}
 
/* ─── TAB SWITCH ─── */
function switchTab(tab) {
  document.getElementById('tab-gantt').classList.toggle('active', tab === 'gantt');
  document.getElementById('tab-checklist').classList.toggle('active', tab === 'checklist');
  document.getElementById('gantt-view').style.display = tab === 'gantt' ? 'block' : 'none';
  document.getElementById('checklist-view').classList.toggle('visible', tab === 'checklist');
}
 
/* ─── INIT ─── */
loadState();       // ← carrega estado salvo ANTES de renderizar
buildLegend();
buildGantt();
buildChecklist();
updateStats();
</script>
